<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lessel Plugins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #eef1f5;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-tertiary: #8c939d;
    --border: #d0d7de;
    --border-light: #e8ecf0;
    --accent: #0969da;
    --accent-hover: #0550ae;
    --accent-light: #ddf4ff;
    --success: #1a7f37;
    --success-light: #dafbe1;
    --shadow-sm: 0 1px 2px rgba(31,35,40,0.04);
    --shadow-md: 0 3px 8px rgba(31,35,40,0.08);
    --shadow-lg: 0 8px 24px rgba(31,35,40,0.12);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Nav ──────────────────────────── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-light);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 700;
    font-size: 1.25rem;
    color: var(--text-primary);
    text-decoration: none;
  }

  .nav-brand span { color: var(--accent); }

  /* ── Hero Search ──────────────────── */
  .hero {
    padding: 4rem 2rem 3rem;
    text-align: center;
    background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg) 100%);
  }

  .hero h1 {
    font-size: 2.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  .hero p {
    color: var(--text-secondary);
    font-size: 1.1rem;
    margin-bottom: 2rem;
  }

  .search-container {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
  }

  .search-container .material-icons-round {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 1.25rem;
  }

  #searchInput {
    width: 100%;
    padding: 0.9rem 1rem 0.9rem 3rem;
    font-size: 1rem;
    font-family: var(--font);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg);
    box-shadow: var(--shadow-sm);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  /* ── Tags ─────────────────────────── */
  .tags-section {
    padding: 0 2rem 2rem;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .tag {
    padding: 0.4rem 0.9rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: 999px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .tag:hover, .tag.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── Layout ───────────────────────── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: flex;
    gap: 2rem;
  }

  .main { flex: 1; min-width: 0; }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
  }

  .sidebar.collapsed { display: none; }

  .sidebar-toggle {
    display: none;
    margin-bottom: 1rem;
    padding: 0.5rem 1rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .filter-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .filter-card h3 {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    margin-bottom: 0.75rem;
  }

  .filter-option {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text-secondary);
    transition: color 0.15s;
  }

  .filter-option:hover { color: var(--text-primary); }
  .filter-option.active { color: var(--accent); font-weight: 500; }

  .filter-option input[type="radio"] {
    accent-color: var(--accent);
    width: 1rem;
    height: 1rem;
  }

  /* ── Sections ─────────────────────── */
  .section { margin-bottom: 2.5rem; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .section-header .material-icons-round {
    font-size: 1.25rem;
    color: var(--accent);
  }

  /* ── Plugin Row/Card ──────────────── */
  .plugin-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .plugin-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1rem;
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s;
  }

  .plugin-row:hover {
    border-color: var(--border);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .plugin-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .plugin-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .plugin-icon .material-icons-round {
    font-size: 1.5rem;
    color: var(--text-tertiary);
  }

  .plugin-info { flex: 1; min-width: 0; }

  .plugin-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-primary);
    margin-bottom: 0.15rem;
  }

  .plugin-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
    flex-wrap: wrap;
  }

  .plugin-meta .material-icons-round {
    font-size: 0.85rem;
    vertical-align: middle;
  }

  .plugin-stats {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .plugin-tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .plugin-tags span {
    padding: 0.15rem 0.5rem;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    font-size: 0.75rem;
    color: var(--text-secondary);
    border: 1px solid var(--border-light);
  }

  /* ── Detail View ──────────────────── */
  #detailView {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .detail-header {
    display: flex;
    gap: 1rem;
    padding: 1.5rem;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-light);
    align-items: flex-start;
  }

  .detail-icon {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-md);
    object-fit: cover;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .detail-icon img { width: 100%; height: 100%; object-fit: cover; }
  .detail-icon .material-icons-round { font-size: 2rem; color: var(--text-tertiary); }

  .detail-title { flex: 1; }

  .detail-title h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .detail-title .author {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .detail-close {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .detail-close:hover { background: var(--bg-tertiary); }

  .detail-body {
    display: flex;
    gap: 0;
    min-height: 400px;
  }

  .detail-content {
    flex: 1;
    padding: 1.5rem;
    overflow: auto;
    max-height: 600px;
  }

  .detail-content h1, .detail-content h2, .detail-content h3 {
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
    font-weight: 600;
  }

  .detail-content h1:first-child, .detail-content h2:first-child, .detail-content h3:first-child { margin-top: 0; }

  .detail-content p { margin-bottom: 1rem; color: var(--text-secondary); }
  .detail-content ul { margin: 1rem 0 1rem 1.5rem; color: var(--text-secondary); }
  .detail-content li { margin-bottom: 0.35rem; }
  .detail-content pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 1rem;
    overflow-x: auto;
    font-size: 0.85rem;
    line-height: 1.6;
    margin: 1rem 0;
  }
  .detail-content code {
    background: var(--bg-secondary);
    padding: 0.15rem 0.35rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: 'SF Mono', Monaco, monospace;
  }
  .detail-content pre code { background: none; padding: 0; }
  .detail-content a { color: var(--accent); text-decoration: none; }
  .detail-content a:hover { text-decoration: underline; }
  .detail-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  .detail-content th, .detail-content td { padding: 0.6rem 0.75rem; border: 1px solid var(--border-light); text-align: left; font-size: 0.85rem; }
  .detail-content th { background: var(--bg-secondary); font-weight: 600; }

  .install-command {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin: 1rem 0;
  }

  .install-command code {
    flex: 1;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.85rem;
  }

  .install-command button {
    padding: 0.5rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  .install-command button:hover { background: var(--accent-hover); }

  .detail-sidebar {
    width: 240px;
    border-left: 1px solid var(--border-light);
    flex-shrink: 0;
    overflow-y: auto;
    max-height: 600px;
  }

  .detail-sidebar-header {
    padding: 1rem;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    border-bottom: 1px solid var(--border-light);
    position: sticky;
    top: 0;
    background: var(--bg);
  }

  .version-item {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background 0.1s;
  }

  .version-item:hover { background: var(--bg-secondary); }
  .version-item.active { background: var(--accent-light); }

  .version-number {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .version-meta {
    font-size: 0.75rem;
    color: var(--text-tertiary);
    margin-top: 0.2rem;
  }

  .version-readme-toggle {
    font-size: 0.75rem;
    color: var(--accent);
    cursor: pointer;
    margin-top: 0.35rem;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .version-readme {
    display: none;
    margin-top: 0.75rem;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .version-readme.open { display: block; }

  /* ── Responsive ───────────────────── */
  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; }
    .detail-sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border-light); max-height: none; }
    .detail-body { flex-direction: column; }
    .hero h1 { font-size: 1.75rem; }
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-tertiary);
  }

  .empty-state .material-icons-round {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }
</style>
</head>

<nav>

      </div>
    </div>
  </aside>
</div>

function init() {

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    if (!q) {
      showHome();
      return;
    }
    const results = plugins.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      p.author.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q))
    );
    showSearchResults(results);
  });
}

// ── Render helpers ──────────────────────────────────────────────
function renderTags() {
  const allTags = [...new Set(plugins.flatMap(p => p.tags || []))].sort();
  const container = document.getElementById('tagsSection');
  container.innerHTML = allTags.map(t => 
    '<span class="tag" onclick="toggleTag(this, \'' + t + '\')">' + escapeHtml(t) + '</span>'
  ).join('');
}

function toggleTag(el, tag) {
  el.classList.toggle('active');
  activeTagFilter = el.classList.contains('active') ? tag : null;
  applyFilters();
}

function renderPluginList(list, containerId) {
  const container = document.getElementById(containerId);
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><span class="material-icons-round">search_off</span><p>No plugins found</p></div>';
    return;
  }
  container.innerHTML = list.map(p => renderPluginRow(p)).join('');
}

function renderPluginRow(p) {
  const iconHtml = p.icon
    ? '<img src="' + escapeHtml(p.icon) + '" alt="" loading="lazy">'
    : '<span class="material-icons-round">extension</span>';

  const downloads = formatNumber(p.totalDownloads || 0);
  const tagsHtml = (p.tags || []).slice(0, 3).map(t => '<span>' + escapeHtml(t) + '</span>').join('');

  return '<div class="plugin-row" onclick="showDetail(\'' + escapeHtml(p.name) + '\')">' +
    '<div class="plugin-icon">' + iconHtml + '</div>' +
    '<div class="plugin-info">' +
      '<div class="plugin-name">' + escapeHtml(p.name) + '</div>' +
      '<div class="plugin-meta">' +
        '<span><span class="material-icons-round">person</span>' + escapeHtml(p.author) + '</span>' +
        '<span><span class="material-icons-round">tag</span>v' + escapeHtml(p.latestVersion || '—') + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="plugin-stats">' +
      '<span><span class="material-icons-round">download</span>' + downloads + '</span>' +
    '</div>' +
    '<div class="plugin-tags">' + tagsHtml + '</div>' +
  '</div>';
}

function renderSearchResults(pluginsList) {
  const container = document.getElementById('searchList');
  const empty = document.getElementById('searchEmpty');
  if (pluginsList.length === 0) {
    container.style.display = 'none';
    empty.style.display = 'block';
  } else {
    container.style.display = 'flex';
    empty.style.display = 'none';
    container.innerHTML = pluginsList.map(p => renderPluginRow(p)).join('');
  }
}

// ── Navigation ──────────────────────────────────────────────────
function showHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('heroSection').style.display = 'block';
  document.getElementById('tagsSection').style.display = 'flex';
  document.getElementById('searchInput').value = '';
}

function showSearchResults(results) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('searchResults').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('heroSection').style.display = 'block';
  document.getElementById('tagsSection').style.display = 'flex';
  renderSearchResults(results);
}

function showDetail(name) {
  const plugin = plugins.find(p => p.name === name);
  if (!plugin) return;

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('tagsSection').style.display = 'none';

  const iconHtml = plugin.icon
    ? '<img src="' + escapeHtml(plugin.icon) + '" alt="">'
    : '<span class="material-icons-round">extension</span>';

  const readmeHtml = plugin.readme
    ? '<div class="detail-content">' + plugin.readme + '<div class="install-command"><code>lessel plugin install ' + escapeHtml(plugin.name) + '</code><button onclick="copyInstall(\'' + escapeHtml(plugin.name) + '\')"><span class="material-icons-round" style="font-size:1rem;">content_copy</span>Copy</button></div></div>'
    : '<div class="detail-content"><div class="empty-state" style="padding:2rem;"><span class="material-icons-round">description</span><p>No README available for this plugin.</p><div class="install-command"><code>lessel plugin install ' + escapeHtml(plugin.name) + '</code><button onclick="copyInstall(\'' + escapeHtml(plugin.name) + '\')"><span class="material-icons-round" style="font-size:1rem;">content_copy</span>Copy</button></div></div>';

  const versions = Object.keys(plugin.versions || {}).sort(semverSort).reverse();

  let versionsHtml = '';
  for (const ver of versions) {
    const info = plugin.versions[ver];
    const hasReadme = !!info.readme;
    versionsHtml += '<div class="version-item" onclick="selectVersion(this, \'' + escapeHtml(ver) + '\', \'' + escapeHtml(plugin.name) + '\')">' +
      '<div class="version-number">' +
        'v' + escapeHtml(ver) +
        (hasReadme ? '<span class="material-icons-round" style="font-size:0.9rem;color:var(--text-tertiary);">description</span>' : '') +
      '</div>' +
      '<div class="version-meta">' + escapeHtml(info.published || '') + ' · ' + formatNumber(info.size || 0) + ' bytes</div>' +
      (hasReadme ? '<div class="version-readme-toggle" onclick="event.stopPropagation();toggleVersionReadme(this)"><span class="material-icons-round" style="font-size:0.85rem;">chevron_right</span> Readme</div>' : '') +
      (hasReadme ? '<div class="version-readme">' + info.readme + '</div>' : '') +
    '</div>';
  }

  document.getElementById('detailView').innerHTML = 
    '<div class="detail-header">' +
      '<div class="detail-icon">' + iconHtml + '</div>' +
      '<div class="detail-title">' +
        '<h2>' + escapeHtml(plugin.name) + '</h2>' +
        '<div class="author">by ' + escapeHtml(plugin.author) + '</div>' +
      '</div>' +
      '<button class="detail-close" onclick="showHome()" title="Close"><span class="material-icons-round">close</span></button>' +
    '</div>' +
    '<div class="detail-body">' +
      readmeHtml +
      '<div class="detail-sidebar">' +
        '<div class="detail-sidebar-header">Versions (' + versions.length + ')</div>' +
        versionsHtml +
      '</div>' +
    '</div>';
}

function selectVersion(el, version, pluginName) {
  document.querySelectorAll('.version-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  // Scroll to the install command for that version
  const plugin = plugins.find(p => p.name === pluginName);
  if (plugin && plugin.versions[version]?.readme) {
    // Version-specific readme is already shown inline
  }
}

function toggleVersionReadme(el) {
  const readme = el.nextElementSibling;
  readme.classList.toggle('open');
  const icon = el.querySelector('.material-icons-round');
  icon.textContent = readme.classList.contains('open') ? 'expand_more' : 'chevron_right';
}

function copyInstall(name) {
  navigator.clipboard.writeText('lessel plugin install ' + name);
  const btn = event.target.closest('button');
  const original = btn.innerHTML;
  btn.innerHTML = '<span class="material-icons-round" style="font-size:1rem;">check</span> Copied';
  setTimeout(() => { btn.innerHTML = original; }, 2000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── Filtering/Sorting ───────────────────────────────────────────
function applyFilters() {
  currentSort = document.querySelector('input[name="sort"]:checked')?.value || 'trending';
  const q = document.getElementById('searchInput').value.toLowerCase().trim();

  let filtered = plugins.slice();

  // Text search
  if (q) {
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      p.author.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  // Tag filter
  if (activeTagFilter) {
    filtered = filtered.filter(p => (p.tags || []).includes(activeTagFilter));
  }

  // Sort
  switch (currentSort) {
    case 'downloads':
      filtered.sort((a, b) => (b.totalDownloads || 0) - (a.totalDownloads || 0));
      break;
    case 'name':
      filtered.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'recent':
      filtered.sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
      break;
    case 'trending':
    default:
      filtered.sort((a, b) => b.trendingScore - a.trendingScore);
      break;
  }

  showSearchResults(filtered);
}

// ── Utils ───────────────────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"');
}

function formatNumber(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function semverSort(a, b) {
  const pa = a.split('.').map(Number);
  const pb = b.split('.').map(Number);
  for (let i = 0; i < 3; i++) {
    if (pa[i] !== pb[i]) return pa[i] - pb[i];
  }
  return 0;
}

// ── Boot ────────────────────────────────────────────────────────
init();
</script>
