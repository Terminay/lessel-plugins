name: Build Registry Index & Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/**'

# Grant write permissions for both pushing changes and deploying Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent build
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for git push
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate plugin structure
        run: |
          echo "Validating plugin structure..."
          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ ! -f "$dir/plugin.json" ]; then
              echo "❌ $name: missing plugin.json"
              exit 1
            fi
            versions=$(find "$dir" -maxdepth 1 -type d -name '[0-9]*.[0-9]*.[0-9]*' | wc -l)
            if [ "$versions" -eq 0 ]; then
              echo "❌ $name: no version directories (e.g. 1.0.0/)"
              exit 1
            fi
            echo "✓ $name validated"
          done

      - name: Build registry.json
        run: node scripts/build.js

      - name: Build GitHub Pages
        run: node scripts/build.js --pages

      - name: Commit and push registry + docs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add registry.json docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build registry index and pages"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4