name: Build Registry Index & Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'scripts/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # Skip running if the last commit was made by the GitHub Actions bot
    if: github.actor != 'github-actions[bot]'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate plugin structure
        run: |
          echo "Validating plugin structure..."
          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ ! -f "$dir/plugin.json" ]; then
              echo "❌ $name: missing plugin.json"
              exit 1
            fi
            versions=$(find "$dir" -maxdepth 1 -type d -name '[0-9]*.[0-9]*.[0-9]*' | wc -l)
            if [ "$versions" -eq 0 ]; then
              echo "❌ $name: no version directories (e.g. 1.0.0/)"
              exit 1
            fi
            echo "✓ $name validated"
          done

      - name: Build registry.json
        run: node scripts/build.js

      - name: Commit and Push registry.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # Only commit if registry.json actually changed
          if ! git diff --exit-code registry.json; then
            git add registry.json
            git commit -m "chore: automated registry index update [skip ci]"
            git push origin main
          else
            echo "No changes to registry.json"
          fi

      - name: Build GitHub Pages
        run: node scripts/build.js --pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
